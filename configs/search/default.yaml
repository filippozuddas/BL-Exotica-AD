# Search / inference configuration

data: configs/data/synthetic.yaml
model_path: null   # Set via CLI: --model outputs/<run_id>/checkpoints/best.pt

search:
  batch_size: 128
  sliding_window: true
  window_stride: 0.5      # Fraction of window size (0.5 = 50% overlap)
  anomaly_metric: mse     # mse | ssim | combined

candidates:
  threshold_percentile: 99.5   # Flag top N% by reconstruction error
  min_separation_bins: 8       # Deduplicate detections within N bins

# Stadio B vetting plugin — OccupancyScorer (src/search/vetting/occupancy.py),
# 0000.fil only. Not yet wired into candidates.py — see
# docs/2026-07-02_occupancy_scorer_plan.md section 8 (pending pass/fail on
# scripts/debug/occupancy_scorer_test.py). Values match the plan's default
# ON/OFF split (6-obs ABACAD cadence) and drift bank.
vetting:
  enabled: false
  on_indices: [0, 2, 4]
  off_indices: [1, 3, 5]
  boxcar_width: 3          # frequency-axis smoothing (channels)
  drift_step: 2             # channel-displacement step of the drift bank
  fp_budget: 0.10           # threshold = this percentile of real-negative scores

output:
  save_stamps: true      # Save spectrogram stamps for each candidate
  stamp_context: 4       # Extra bins around candidate window in stamp
  format: csv            # csv | fits
