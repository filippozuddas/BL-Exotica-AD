# Vision-Transformer Masked Autoencoder (ViT-MAE) — 4th build_autoencoder
# backbone, alongside convae / convae_mae (CNN-MAE) / VAE. architecture:
# vit_mae routes build_autoencoder() straight to build_vit_mae(), bypassing
# the CNN encoder/bottleneck/decoder config sections entirely.
#
# Input: (96, 1024) — full 6-observation cadence (6 × 16 time bins) × 1024 freq channels.
#
# Patch tokenisation: Conv2d PatchEmbed with patch_size (16, 16) on the
# (96, 1024) cadence snippet -> a (6, 64) = 384-patch grid, 16*16*1=256 raw
# values per patch. Each patch covers exactly one full observation (16 time bins)
# × 64 frequency channels (~179 Hz), giving attention direct access to
# inter-observation drift structure. patch_size (16,16) keeps narrowband signals
# (~3-10 Hz, 1-4 channels) at ~6-25% of the patch area — 4× less diluted than
# (16,64) which gives only 1-6%.
#
# Training (compute_loss): He et al. token-removal masking — mask_ratio=0.75
# means the encoder sees only 96 of 384 patch tokens per sample (fresh random
# subset each step); decoder reconstructs all 384 from those 96 + a shared
# learnable mask token, loss on the 288 masked patches only.
#
# Inference (forward): deterministic 24-pass partitioned reconstruction — the
# (6, 64) grid has nh=6 row groups; each pass keeps one row of 64 tokens visible
# so every token is masked in 23 of 24 passes. Reconstruction error = average
# over the passes where the token was masked. See src/models/vit_mae.py.

architecture: vit_mae

patch_size: [16, 16]

# --- Encoder (ViT, pre-norm transformer blocks) ---
embed_dim: 128
depth: 6
num_heads: 4

# --- Decoder (lightweight transformer, global attention) ---
decoder_embed_dim: 64
decoder_depth: 2
decoder_num_heads: 4

# --- Shared ---
mlp_ratio: 4
mask_ratio: 0.75       # training only; inference uses the fixed 24-pass partition

# He et al. per-patch target normalisation: off by default. If true,
# ViTMAE.compute_loss raises NotImplementedError (not yet implemented).
norm_pix_loss: false
