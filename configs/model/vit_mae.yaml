# SSAST-style ViT-MAE — 4th build_autoencoder backbone, alongside convae /
# convae_mae (CNN-MAE) / VAE. architecture: vit_mae routes build_autoencoder()
# straight to build_vit_mae(), bypassing the CNN encoder/bottleneck/decoder
# config sections entirely. See src/models/vit_mae.py.
#
# Design follows SSAST (Gong et al. 2022, arXiv:2110.09784), not He et al.:
#   - In-place (BERT-style) masking, single transformer: every patch token is
#     fed to the encoder; masked positions get a shared learnable mask_token.
#     No separate decoder. Keeps the full encoder representation at masked
#     positions (needed by the discriminative head) and makes encode() (no
#     masking) the same token regime as training (needed by embedding scoring).
#   - Joint discriminative (InfoNCE) + generative (MSE) objective, L = L_d + λ·L_g.
#   - MSPM cluster masking: C×C blocks, C ~ unif{cluster_factor}.
#
# ---- Per-product adaptation: change ONLY input_shape (in the data config) and
#      patch_size below. No code branches per product. ----
#   0000.fil (narrowband): input (96,1024) [6-obs cadence × 1024 chans], patch [16,16]
#                          -> (6,64)=384 patches, 256 raw values/patch.
#   0001.fil (broadband transient): single observation; input_shape/patch_size TBD.
#   0002.fil (wideband): TBD pending signal morphology.

architecture: vit_mae

patch_size: [16, 16]

# --- Transformer encoder (pre-norm) ---
embed_dim: 128
depth: 6
num_heads: 4
mlp_ratio: 4

# --- Masking ---
mask_ratio: 0.75           # fraction of patches masked during training
mask_mode: cluster         # cluster (SSAST MSPM) | random (He-style scattered)
cluster_factor: [3, 5]     # C ~ unif{c_min, c_max} for cluster masking

# --- Joint objective ---
loss_mode: joint           # joint | generative | discriminative
infonce_lambda: 10.0       # L = L_d + infonce_lambda * L_g  (SSAST λ=10)
infonce_temperature: 0.07  # InfoNCE logit temperature. Embeddings are L2-normalised
                           # (cosine logits in [-1,1]); a low temp is required so the
                           # softmax can concentrate over the ~n_masked candidates
                           # (temp=1.0 floors the loss near log(n_masked) → inert).

# --- Inference anomaly score ---
#   embedding (default): encoder features + one-class classifier (src/search/scorer.py);
#                        independent of reconstruction magnitude — best for narrowband.
#   infonce: per-patch self-recognition difficulty.
#   recon:   partitioned reconstruction MSE — for morphology-rich products (0001/0002).
# NOTE: recon/infonce inference masks scattered round-robin patches, whereas training
# masks C×C clusters — a train/inference masking-geometry shift that can depress those
# two scores. The default embedding score (encode() uses no masking) sidesteps it.
scoring: embedding

# SSAST per-patch target normalisation: off (compute_loss raises if true).
norm_pix_loss: false
