# UDMA model config — BOTTLENECK ablation, TIGHT arm (2026-07-22).
#
# Answers the one question the mem_slots=30 experiment could not: does
# re-imposing a capacity limiter on the students restore the disagreement
# signal on anomalies? Qi et al. 2024 §V give the students a narrow 1x8x32
# bottleneck; our trunk instead keeps the full (6,64) grid at 64 channels
# (24576 dims, ~96x the paper's 256). That was a deliberate, validated
# anti-dilution deviation, but it removed the third of the paper's three
# capacity limiters — see docs/02, memory: udma_paper_alignment_check, and
# Zach's external review point 1 (memory: zach_review_verification).
#
# This arm uses the paper's literal geometry: (1,8) spatial x 32 channels.
# The `loose` sibling config brackets it at (3,16)x64 (3072 dims). Running
# both isolates "is there a bottleneck effect at all" from "is 256 dims
# simply too tight for a (96,1024) snippet".
#
# EVERYTHING else is byte-identical to udma_old_teacher.yaml (same teacher
# 057f87c, mem_slots 500, lambdas, topk_frac) so the ablation moves exactly
# one variable. The squeeze is placed AFTER the memory unit — see the
# FeatureStudent docstring for why paper-faithful placement would confound
# the two limiters.
#
# Pre-registered bars (det@3sigma_cad, frozen Tier A cadence list, baseline
# = 79.11 / 95.56 / 100.0 at SNR 15/20/30):
#   PASS  SNR15 >= +5 pt over baseline AND no more than -2 pt at SNR20/30
#   KILL  <= baseline at every SNR
# val_ss trajectory (baseline 0.024 -> 0.064) is DIAGNOSTIC ONLY, never a
# pass on its own — mem30 showed a 2.2-2.8x mechanistic gain that never
# converted to detection (memory: udma_mem30_fase1_result).

architecture: udma

teacher:
  checkpoint: outputs/training/20260624_084754_057f87c/checkpoints/epoch=006-val_loss=2.1715.ckpt
  vit_config: configs/model/vit_mae.yaml
  teacher_layer: 3
  norm_stats: outputs/udma_teacher_norm/gbt_fine_exotica_block3.pt

student:
  encoder:
    filters: [32, 64, 128, 256]
    convs_per_block: 2
    kernel_size: [3, 3]
    activation: relu
    use_batchnorm: true
  bottleneck:
    latent_dim: 64
    # THE ONLY DIFFERENCE FROM udma_old_teacher.yaml.
    # Trunk grid is (6,64); squeeze to (1,8) uses non-overlapping
    # kernel=stride=(6,8), then a transposed conv restores (6,64) before the
    # head. Code path: 64x6x64 -> 32x1x8 (256 dims) -> 64x6x64.
    squeeze:
      shape: [1, 8]
      channels: 32
  head_hidden: 128
  head_context_convs: 2
  mem_slots: 500
  shrink_threshold: 0.002

loss:
  lambda1: 1.0
  lambda2: 1.0
  lambda3: 1.0
  entropy_weight: 2.0e-4

scoring:
  weights: [0.5, 0.5, 0.5]
  topk_frac: 0.01
