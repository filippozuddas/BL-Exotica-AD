# Full training run on real SRT 0000-equivalent cadence data (ViT-MAE backbone).
#
#   CUDA_VISIBLE_DEVICES=1 PYTHONPATH=. python scripts/train.py \
#       --config configs/training/srt_real.yaml

data: configs/data/gbt_fine.yaml
model: configs/model/vit_mae.yaml

training:
  batch_size: 256
  epochs: 200
  warmup_epochs: 20
  learning_rate: 3.0e-4
  optimizer: adam
  loss: mse
  gradient_clip_val: 1.0
  seed: 42
  patience: 30
  min_delta: 1.0e-5
  monitor: val_loss
  snapshot_every: 2

hardware:
  num_gpus: 2
  mixed_precision: true
  num_workers: 16

output_dir: outputs
