# Training configuration
# Merges with a data config and model config at runtime

data: configs/data/gbt_fine.yaml
model: configs/model/convae.yaml

training:
  batch_size: 256
  epochs: 100
  warmup_epochs: 10
  learning_rate: 1.0e-3
  optimizer: adam
  gradient_clip_val: 1.0
  loss: mse            # mse | ssim | mse+ssim
  seed: 42

  # Early stopping
  patience: 15
  min_delta: 1.0e-5
  monitor: val_loss

hardware:
  num_gpus: 2          # -> Lightning Trainer(devices=...); set to 0 for CPU-only
  mixed_precision: true  # trainer maps true -> "bf16-mixed" (native bf16 on Ada/4090, no GradScaler), false -> "32-true"

output_dir: outputs    # Run-specific subdir created automatically
