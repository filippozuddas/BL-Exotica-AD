# UDMA training config (Q7) — 0000.fil, same mmap 1M+ dataset/split as the
# other gbt_fine backbones (memae_gbt_fine.yaml, dae_gbt_fine.yaml).
#
# lr 1e-3 (not the paper's 5e-3, which was tuned for their ~9k-sample dataset;
# ours is ~560k train snippets). batch 256: target (128,6,64) feature maps are
# far lighter than pixel-space (96,1024) reconstructions, so this is a much
# smaller per-step footprint than memae_gbt_fine's batch 1024 despite the extra
# teacher forward pass. max 30 epochs — the pixel MemAE converged by ~epoch 20
# and UDMA's students regress a fixed, cheap-to-fit target.

data: configs/data/gbt_fine.yaml
model: configs/model/udma.yaml

training:
  batch_size: 256
  epochs: 30
  learning_rate: 1.0e-3
  optimizer: adamw
  weight_decay: 0.01
  loss: mse            # unused by UDMA (its own compute_loss owns the objective); kept for schema parity
  seed: 42

  # Early stopping on S-T regression quality only (see UDMA.compute_loss's
  # "st_sum" = st1+st2, logged as val_st_sum) — NOT val_loss, which also
  # contains the ss/entropy terms that a degenerate student pair could game.
  patience: 8
  min_delta: 1.0e-5
  monitor: val_st_sum

hardware:
  num_gpus: 2
  mixed_precision: true  # bf16-mixed; the frozen ViT teacher has no BatchNorm, LayerNorm is fine in bf16
  num_workers: 16

output_dir: outputs
